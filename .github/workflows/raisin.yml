# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

env:
  registryName: selmcrpb7uuykwthreg.azurecr.io
  repositoryName: wth/dotnetcoreapp
  dockerFolderPath: Application/src/RazorPagesTestSample
  tag: ${{ github.run_number }}

on:
  push:
    paths:
    - 'Application/**'

  pull_request:
    paths:
    - 'Application/**'

jobs:
  job1:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
    - name: Restore dependencies
      run: dotnet restore Application/src/RazorPagesTestSample/RazorPagesTestSample.csproj
    - name: Build
      run: dotnet build --no-restore Application/src/RazorPagesTestSample/RazorPagesTestSample.csproj
    - name: Test
      run: dotnet test --no-build --verbosity normal Application/src/RazorPagesTestSample/RazorPagesTestSample.csproj


      job2:
        build:
    
          runs-on: ubuntu-latest
    
          steps:
          - uses: actions/checkout@v2
          - name: Docker login
            run: docker login $registryName -u ACR-Token -p ${ACRCREDS.ACR_PASSWORD} selmcrpb7uuykwthreg.azurecr.io
          - name: Docker build
            run: docker build -t $registryName/$repositoryName:$tag --build-arg build_version=$tag $dockerFolderPath
          - name: Docker push
            run: docker push $registryName/$repositoryName:$tag
            
            

